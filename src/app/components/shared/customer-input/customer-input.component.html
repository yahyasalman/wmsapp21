

<div class="p-autocomplete p-component p-inputwrapper" [ngClass]="{'border-red-500': invalid}">
<p-autocomplete 
    [(ngModel)]="selectedCustomerName" 
    [ngModelOptions]="{standalone: true}"    
    [suggestions]="customers" 
    (completeMethod)="filterCustomer($event)" 
     optionLabel="customerName"
    (onSelect)="onSelect($event)" 
    (onClear)="onUnselectCustomer()" 
    [showClear]="true"
    placeholder="{{ this.sharedService.T('chooseCustomer') }}"
    class="w-full"
    >
    <ng-template let-customer #item>
        <div class="flex items-center gap-2">
            <div>{{ customer.customerName }}</div>
        </div>
    </ng-template>
    <ng-template #footer>
        <div class="px-3 py-3">
            @if(showFooter)
            {
                <p-button label="Skapa Ny Kund" text size="small" icon="pi pi-plus" (onClick)="createCustomer(selectedCustomerName)" />
            }
            
        </div>
    </ng-template>
</p-autocomplete>
</div>
