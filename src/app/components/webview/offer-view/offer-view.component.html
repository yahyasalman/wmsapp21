<div class="lg:flex bg-bgColor">
    <div class="w-[236px] shadow-sm bg-white lg:block hidden">
        
    </div>
    <section class="pb-5 w-full">
        <div class="bg-white md:text-start text-center lg:px-6 px-3 py-2 h-16">
            <p class="font-normal text-2xl pt-1">{{workshopName}}</p>
        </div>
        <div class="grid grid-cols-12 gap-5 my-10 px-5">
            <div class="md:col-span-8 col-span-12">
                <pdf-viewer
                [src]="pdfUrl"
                [rotation]="0"
                [original-size]="false"
                [show-all]="true"
                [fit-to-page]="false"
                [zoom]="1"
                [zoom-scale]="'page-width'"
                [stick-to-page]="false"
                [render-text]="true"
                [external-link-target]="'blank'"
                [autoresize]="true"
                [show-borders]="false"
                style="width: 100%;"
                class="xl:h-[400mm] lg:h-[297mm] md:h-[250mm] sm:h-[230mm] h-[155mm]"
            ></pdf-viewer> 
            
            </div>
            <div class="md:col-span-4 col-span-12">
                <div class="text-center text-Darkgray text-sm px-3 py-4 mb-4 bg-white shadow rounded-xl">
                    <div class="flex justify-center mb-3">
                        <img src="assets/images/logo.png" class="w-28" alt="Logo">
                    </div>
                    <p class=" ">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
                    <button class="bg-blue text-White py-2 px-3 rounded-md mt-3">Valkommen att testa</button>
                </div>
                <div class="font-medium text-Darkgray p-4 mb-4 bg-white shadow rounded-xl">
