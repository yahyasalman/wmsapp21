<div class="p-6 bg-slate-50 min-h-screen">
  <div class="mb-8">
    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Reports</h1>
  </div>

  <div class="flex flex-col gap-5">
    
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <div class="flex flex-wrap items-center justify-start gap-10">
        
        <div class="min-w-[150px]">
          <h3 class="font-bold text-slate-800 text-lg whitespace-nowrap">Invoice Reports</h3>
        </div>

        <div class="flex flex-wrap items-center gap-4">
          <p-datepicker 
            [(ngModel)]="selectedMonth" 
            [ngModelOptions]="{standalone: true}"
            view="month" 
            dateFormat="MM yy" 
            showIcon="true" 
            iconDisplay="input"
            placeholder="Select Month" 
            (onSelect)="onSelectMonth($event)" 
            styleClass="w-52 custom-picker" />

          <div class="flex bg-slate-100 p-1 rounded-lg">
            <button (click)="downloadInvoice('excel')"
              class="px-4 py-2 hover:bg-white hover:shadow-sm text-emerald-700 rounded-md transition-all flex items-center gap-2 font-semibold">
              <i class="pi pi-file-excel"></i> Excel
            </button>
            <button (click)="downloadInvoice('pdf')"
              class="px-4 py-2 hover:bg-white hover:shadow-sm text-rose-700 rounded-md transition-all flex items-center gap-2 font-semibold">
              <i class="pi pi-file-pdf"></i> PDF
            </button>
            <button (click)="downloadInvoice('sie')"
              class="px-4 py-2 hover:bg-white hover:shadow-sm text-indigo-700 rounded-md transition-all flex items-center gap-2 font-semibold">
              <i class="pi pi-file"></i> SIE
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
      <div class="flex flex-wrap items-center justify-start gap-10">
        
        <div class="min-w-[150px]">
          <h3 class="font-bold text-slate-800 text-lg whitespace-nowrap">Attendance Logs</h3>
        </div>

        <div class="flex flex-wrap items-center gap-4">
          <p-datepicker 
            [(ngModel)]="attendanceMonth" 
            [ngModelOptions]="{standalone: true}"
            view="month" 
            dateFormat="MM yy" 
            showIcon="true"
            iconDisplay="input" 
            placeholder="Select Month" 
            (onSelect)="onSelectMonth($event)"
            styleClass="w-52 custom-picker" />

          <button (click)="downloadAttendance()"
            class="px-6 py-2 bg-slate-900 hover:bg-black text-white rounded-xl shadow-lg transition-all flex items-center gap-2 font-medium">
            <i class="pi pi-download"></i> Download PDF
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
